<!DOCTYPE html>
<html>
<head>
<title>Babbuuu ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
overflow:hidden;
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff6a88,#ff99ac);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.container{
z-index:2;
}

h1{
font-size:50px;
animation: glow 2s infinite alternate;
}

h2{
margin-top:10px;
font-weight:normal;
}

button{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
font-size:20px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.15);
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 35px white;}
}

.heart{
position:absolute;
color:#ff1744;
animation: float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0);
opacity:1;
}
100%{
transform:translateY(-10vh) scale(1.5);
opacity:0;
}
}

</style>

<script>

window.onload=function(){
alert("It's 12:30 ❤️ let's connect Babbuuu 😘");
}

function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*30+20)+"px";

document.body.appendChild(heart);

setTimeout(function(){
heart.remove();
},6000);
}

setInterval(createHeart,250);

</script>

</head>

<body>

<div class="container">

<h1>Babbuuu ❤️</h1>

<h2>You make my world brighter ✨</h2>

<p>If you miss me too click below 😜</p>

<a href="tel:+917668851498">
<button>Call Dabbuu ❤️</button>
</a>

</div>

</body>
</html>
